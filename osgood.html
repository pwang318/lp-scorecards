<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osgood — Weekly Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2e5a;--navy-mid:#243d7a;--navy-dark:#111e3d;
  --gold:#c9a84c;--gold-light:#f0c84a;--gold-pale:#fdf6e3;
  --bg:#f0f2f8;--card:#ffffff;--border:#e2e6f0;
  --text:#111827;--muted:#6b7280;--faint:#9ca3af;
  --green:#1a6e35;--green-bg:#e8f5ee;
  --amber:#92600a;--amber-bg:#fef3dc;
  --gray-bg:#f3f4f6;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 60%,var(--navy-mid) 100%);
  padding:0 28px;height:68px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-left{display:flex;align-items:center;gap:16px}
.nfm-logo{height:26px;filter:brightness(0) invert(1);opacity:.92;flex-shrink:0}
.header-divider{width:1px;height:30px;background:rgba(255,255,255,0.2);flex-shrink:0}
.header-brand{display:flex;flex-direction:column;gap:2px}
.header-team{color:var(--gold-light);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.header-name{color:#fff;font-size:17px;font-weight:600;letter-spacing:-.01em}
.week-pill{
  color:var(--gold-light);font-size:12px;font-weight:500;
  background:rgba(255,255,255,0.07);
  padding:5px 14px;border-radius:20px;
  border:1px solid rgba(240,200,74,0.25);white-space:nowrap;
}

/* TABS */
.tab-nav{background:var(--navy-dark);display:flex;border-bottom:1px solid rgba(255,255,255,0.06)}
.tab-nav button{
  flex:1;padding:13px 8px;background:transparent;border:none;
  color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;
  font-family:inherit;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.01em;
}
.tab-nav button.active{color:#fff;border-bottom-color:var(--gold-light)}
.tab-nav button:hover:not(.active){color:rgba(255,255,255,.8)}

/* WEEK NAV */
.week-bar{
  background:var(--navy);padding:10px 28px;
  display:flex;align-items:center;justify-content:center;gap:16px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.week-bar button{
  background:transparent;border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.65);padding:5px 14px;border-radius:20px;
  font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;
}
.week-bar button:hover{background:rgba(255,255,255,0.08);color:#fff;border-color:rgba(255,255,255,0.3)}
.week-bar .week-label{color:#fff;font-size:13px;font-weight:600;min-width:140px;text-align:center}

.main{padding:24px 20px 48px;max-width:720px;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}

/* SUMMARY CARDS */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px}
.summary-card{
  background:var(--card);border-radius:14px;
  border:1px solid var(--border);padding:16px 14px;
  text-align:center;transition:box-shadow .2s;
}
.summary-card:hover{box-shadow:0 4px 16px rgba(26,46,90,.08)}
.s-icon{font-size:20px;margin-bottom:6px}
.s-val{font-size:26px;font-weight:700;line-height:1;letter-spacing:-.02em}
.s-label{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.s-goal{font-size:11px;color:var(--faint);margin-top:3px}
.s-bar{height:3px;background:#eaecf4;border-radius:2px;margin-top:8px;overflow:hidden}
.s-bar-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* MAIN CARD */
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px;}
.card-header{
  background:var(--navy);padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
}
.card-header-title{color:#fff;font-size:13px;font-weight:600;letter-spacing:.02em}
.card-header-hint{color:var(--gold-light);font-size:11px;font-weight:400;opacity:.85}

/* TABLE */
table{width:100%;border-collapse:collapse}
thead tr{background:#f7f8fc}
thead th{
  font-size:11px;font-weight:600;color:var(--muted);
  padding:10px 6px;text-align:center;
  letter-spacing:.05em;text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
thead th:first-child{text-align:left;padding-left:18px;width:40%}
thead th.total-th{color:var(--gold)}
tbody tr{border-bottom:1px solid #f0f2f8;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f9fafd}
tbody td{padding:12px 6px;text-align:center;vertical-align:middle}
tbody td:first-child{text-align:left;padding-left:18px}

.metric-row{display:flex;align-items:center;gap:10px}
.metric-icon{font-size:16px;flex-shrink:0}
.metric-text{font-size:13px;font-weight:500;color:var(--text)}

.day-input{
  width:46px;padding:6px 4px;
  text-align:center;font-size:13px;font-weight:500;
  border:1.5px solid var(--border);border-radius:8px;
  background:#f7f8fc;color:var(--text);
  font-family:inherit;transition:all .15s;
  -moz-appearance:textfield;
}
.day-input::-webkit-inner-spin-button,.day-input::-webkit-outer-spin-button{-webkit-appearance:none}
.day-input:focus{
  outline:none;border-color:var(--navy);background:#fff;
  box-shadow:0 0 0 3px rgba(26,46,90,.1);
}

.total-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.total-num{font-size:15px;font-weight:700;letter-spacing:-.01em}
.total-denom{font-size:10px;color:var(--faint)}
.mini-bar{width:38px;height:3px;background:#eaecf4;border-radius:2px;margin-top:3px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .3s}

/* SAVE */
.save-row{display:flex;align-items:center;gap:14px;margin-top:8px}
.save-btn{
  background:var(--navy);color:#fff;border:none;border-radius:10px;
  padding:11px 28px;font-size:14px;font-weight:600;
  font-family:inherit;cursor:pointer;transition:all .15s;
  letter-spacing:.01em;
}
.save-btn:hover{background:var(--navy-mid);box-shadow:0 4px 12px rgba(26,46,90,.25)}
.save-btn:active{transform:scale(.98)}
.save-msg{font-size:13px;font-weight:500;opacity:0;transition:opacity .3s}
.save-msg.show{opacity:1}
.save-msg.ok{color:var(--green)}
.save-msg.error{color:#c0392b}

.footer{text-align:center;margin-top:32px;font-size:11px;color:var(--faint);letter-spacing:.03em}

/* HISTORY */
.hist-controls{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.hist-controls label{font-size:12px;color:var(--muted);font-weight:500}
.hist-controls input[type=date]{
  padding:7px 11px;border:1.5px solid var(--border);border-radius:8px;
  font-size:12px;font-family:inherit;background:var(--card);color:var(--text);
}
.hist-controls input[type=date]:focus{outline:none;border-color:var(--navy)}
.hist-search-btn{
  padding:7px 16px;background:var(--navy);color:#fff;
  border:none;border-radius:8px;font-size:12px;font-weight:600;
  font-family:inherit;cursor:pointer;transition:background .15s;
}
.hist-search-btn:hover{background:var(--navy-mid)}

.hist-table{width:100%;border-collapse:collapse;font-size:12px}
.hist-table th{background:var(--navy);color:#fff;padding:10px 12px;text-align:center;font-size:11px;font-weight:600;letter-spacing:.04em}
.hist-table th:first-child{text-align:left}
.hist-table td{padding:10px 12px;text-align:center;border-bottom:1px solid #f0f2f8;font-size:12px}
.hist-table td:first-child{text-align:left;font-weight:500;color:var(--text)}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:#f9fafd}

.pct{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-left:4px}
.pct-green{background:var(--green-bg);color:var(--green)}
.pct-amber{background:var(--amber-bg);color:var(--amber)}
.pct-gray{background:var(--gray-bg);color:var(--muted)}

.chart-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:18px;margin-top:14px}
.chart-card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.chart-area{position:relative;height:190px}
.hist-empty{text-align:center;padding:44px 20px;color:var(--muted);font-size:14px}

@media(max-width:500px){
  .header{padding:0 16px;height:60px}
  .nfm-logo{height:22px}
  .header-name{font-size:15px}
  .week-bar{padding:9px 16px}
  .main{padding:16px 12px 40px}
  .day-input{width:36px;font-size:12px}
  .metric-text{font-size:12px}
  thead th{font-size:10px;padding:8px 4px}
  tbody td{padding:10px 4px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="https://nfmlending.com/wp-content/uploads/2020/09/logo_NFMLending.svg" alt="NFM Lending" class="nfm-logo">
    <div class="header-divider"></div>
    <div class="header-brand">
      <div class="header-team">CORE Team &middot; NFM Lending</div>
      <div class="header-name">Osgood &mdash; Weekly Scorecard</div>
    </div>
  </div>
  <div class="week-pill" id="week-label">Loading...</div>
</div>

<div class="tab-nav">
  <button class="active" onclick="switchTab('scorecard',this)">This Week</button>
  <button onclick="switchTab('history',this)">My History</button>
</div>

<div id="tab-scorecard" class="tab-panel active">
  <div class="week-bar">
    <button id="prev-btn">&#8592; Prev</button>
    <span class="week-label" id="week-range">&#8212;</span>
    <button id="next-btn">Next &#8594;</button>
  </div>
  <div class="main">
    <div class="summary-grid" id="summary-grid"></div>
    <div class="card">
      <div class="card-header">
        <span class="card-header-title">Daily Activity Log</span>
        <span class="card-header-hint">Enter your numbers each day</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Metric</th>
            <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th>
            <th class="total-th">Total</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="save-row">
      <button class="save-btn" id="save-btn">Save my week</button>
      <span class="save-msg" id="save-msg"></span>
    </div>
    <div class="footer">Closing Loans &bull; Opening Doors &bull; Changing Lives</div>
  </div>
</div>

<div id="tab-history" class="tab-panel">
  <div class="main">
    <div class="hist-controls">
      <label>From</label>
      <input type="date" id="hist-from">
      <label>To</label>
      <input type="date" id="hist-to">
      <button class="hist-search-btn" onclick="loadHistory()">Search</button>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-header-title">Weekly History</span></div>
      <div id="history-table-wrap"></div>
    </div>
    <div id="history-charts"></div>
    <div class="footer">Closing Loans &bull; Opening Doors &bull; Changing Lives</div>
  </div>
</div>

<script>
const PERSON="Osgood",METRICS=[{"key": "referred_leads", "label": "Referred leads", "icon": "\ud83d\udc65", "goal": 16}, {"key": "apps_1003", "label": "1003's", "icon": "\ud83d\udccb", "goal": 13}, {"key": "pre_approvals", "label": "Pre-approvals", "icon": "\u2705", "goal": 6}, {"key": "contracts", "label": "Contracts", "icon": "\ud83e\udd1d", "goal": 3}, {"key": "rltr_talks", "label": "Realtor talk to's", "icon": "\ud83d\udcf2", "goal": 10}],DAYS=["Mon","Tue","Wed","Thu","Fri"];
const SUPABASE_URL="https://uclucbdkjqyqdvifyptx.supabase.co",SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjbHVjYmRranF5cWR2aWZ5cHR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDY4MzQ4MzQsImV4cCI6MjAyMjQxMDgzNH0.rAMRMWGd9UEjhauRr8vGFRkMuB7VIH3WMvJAkCMY0Sc";
const COLORS=["#1a2e5a","#c9a84c","#1a6e35","#c0392b","#6d3bab"];

function getMonday(d){const dt=new Date(d),day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));dt.setHours(0,0,0,0);return dt;}
function fmtRange(mon){const fri=new Date(mon);fri.setDate(fri.getDate()+4);const o={month:'short',day:'numeric'};return mon.toLocaleDateString('en-US',o)+' – '+fri.toLocaleDateString('en-US',o);}
function weekKey(mon){return mon.getFullYear()+'-'+String(mon.getMonth()+1).padStart(2,'0')+'-'+String(mon.getDate()).padStart(2,'0');}
function pctColor(p){return p>=1?'#1a6e35':p>=0.6?'#92600a':'#9ca3af';}
function pctBadge(t,g){const p=t/g,c=p>=1?'pct-green':p>=0.6?'pct-amber':'pct-gray';return '<span class="pct '+c+'">'+Math.round(p*100)+'%</span>';}

let currentMonday=getMonday(new Date()),currentData={},histCharts=[];

function switchTab(tab,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='history')loadHistory();
}
function getTotal(key,data){return DAYS.reduce((s,d)=>s+(parseInt((data||currentData)[key+'_'+d]||0)||0),0);}
function renderWeekLabel(){
  const wk=weekKey(currentMonday),isNow=weekKey(getMonday(new Date()))===wk;
  document.getElementById('week-label').textContent=isNow?'This week':fmtRange(currentMonday);
  document.getElementById('week-range').textContent=fmtRange(currentMonday);
}
function renderSummary(){
  const grid=document.getElementById('summary-grid');grid.innerHTML='';
  METRICS.forEach(m=>{
    const t=getTotal(m.key),pct=Math.min(t/m.goal,1),color=pctColor(pct);
    const div=document.createElement('div');div.className='summary-card';
    div.innerHTML='<div class="s-icon">'+m.icon+'</div>'
      +'<div class="s-val" style="color:'+color+'">'+t+'</div>'
      +'<div class="s-label">'+m.label+'</div>'
      +'<div class="s-goal">Goal: '+m.goal+'</div>'
      +'<div class="s-bar"><div class="s-bar-fill" style="width:'+Math.round(pct*100)+'%;background:'+color+'"></div></div>';
    grid.appendChild(div);
  });
}
function updateTotalCell(m,td){
  const t=getTotal(m.key),pct=Math.min(t/m.goal,1),color=pctColor(pct);
  td.innerHTML='<div class="total-wrap"><div class="total-num" style="color:'+color+'">'+t+'</div>'
    +'<div class="total-denom">/'+m.goal+'</div>'
    +'<div class="mini-bar"><div class="mini-bar-fill" style="width:'+Math.round(pct*100)+'%;background:'+color+'"></div></div></div>';
}
function renderTable(){
  const tbody=document.getElementById('table-body');tbody.innerHTML='';
  METRICS.forEach(m=>{
    const tr=document.createElement('tr');
    const tdL=document.createElement('td');
    tdL.innerHTML='<div class="metric-row"><span class="metric-icon">'+m.icon+'</span><span class="metric-text">'+m.label+'</span></div>';
    tr.appendChild(tdL);
    const totalTd=document.createElement('td');
    DAYS.forEach(day=>{
      const td=document.createElement('td'),inp=document.createElement('input');
      inp.type='number';inp.min=0;inp.className='day-input';
      inp.value=currentData[m.key+'_'+day]||'';inp.placeholder='0';
      inp.addEventListener('input',()=>{currentData[m.key+'_'+day]=inp.value;updateTotalCell(m,totalTd);renderSummary();});
      td.appendChild(inp);tr.appendChild(td);
    });
    updateTotalCell(m,totalTd);tr.appendChild(totalTd);tbody.appendChild(tr);
  });
}
async function loadWeek(wk){
  currentData={};document.getElementById('week-label').textContent='Loading...';
  try{
    const ctrl=new AbortController(),tid=setTimeout(()=>ctrl.abort(),6000);
    const res=await fetch(SUPABASE_URL+'/rest/v1/lp_scorecards?person=eq.'+encodeURIComponent(PERSON)+'&week_key=eq.'+wk+'&select=data',
      {headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY},signal:ctrl.signal});
    clearTimeout(tid);
    const rows=await res.json();
    if(rows&&rows.length&&rows[0].data)currentData=rows[0].data;
  }catch(e){console.warn(e);}
  renderWeekLabel();renderTable();renderSummary();
}
async function saveWeek(){
  const wk=weekKey(currentMonday),msgEl=document.getElementById('save-msg');
  msgEl.textContent='Saving...';msgEl.className='save-msg show';
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/lp_scorecards',{
      method:'POST',
      headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},
      body:JSON.stringify({person:PERSON,week_key:wk,data:currentData})
    });
    msgEl.textContent=(res.ok||res.status===201)?'✓ Saved':'Error '+res.status;
    msgEl.classList.add(res.ok||res.status===201?'ok':'error');
  }catch(e){msgEl.textContent='Could not save';msgEl.classList.add('error');}
  setTimeout(()=>{msgEl.className='save-msg';},3000);
}
async function loadHistory(){
  const fromEl=document.getElementById('hist-from'),toEl=document.getElementById('hist-to');
  if(!fromEl.value){const d=new Date();d.setDate(d.getDate()-56);fromEl.value=d.toISOString().slice(0,10);}
  if(!toEl.value)toEl.value=new Date().toISOString().slice(0,10);
  const wrap=document.getElementById('history-table-wrap'),chartsEl=document.getElementById('history-charts');
  wrap.innerHTML='<div class="hist-empty">Loading...</div>';chartsEl.innerHTML='';
  histCharts.forEach(c=>c.destroy());histCharts=[];
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/lp_scorecards?person=eq.'+encodeURIComponent(PERSON)
      +'&week_key=gte.'+fromEl.value+'&week_key=lte.'+toEl.value+'&order=week_key.desc&select=week_key,data',
      {headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}});
    const rows=await res.json();
    if(!rows||!rows.length){wrap.innerHTML='<div class="hist-empty">No data found for this date range.</div>';return;}
    let thead='<thead><tr><th>Week</th>';
    METRICS.forEach(m=>thead+='<th>'+m.icon+' '+m.label+'</th>');
    thead+='</tr></thead><tbody>';
    rows.forEach(row=>{
      thead+='<tr><td style="white-space:nowrap">'+fmtRange(new Date(row.week_key+'T12:00:00'))+'</td>';
      METRICS.forEach(m=>{const t=getTotal(m.key,row.data);thead+='<td>'+t+pctBadge(t,m.goal)+'</td>';});
      thead+='</tr>';
    });
    thead+='</tbody>';
    wrap.innerHTML='<div style="overflow-x:auto"><table class="hist-table">'+thead+'</table></div>';
    const weeks=rows.map(r=>new Date(r.week_key+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})).reverse();
    METRICS.forEach((m,i)=>{
      const vals=rows.map(r=>getTotal(m.key,r.data)).reverse();
      const div=document.createElement('div');div.className='chart-card';
      div.innerHTML='<div class="chart-card-title"><span>'+m.icon+'</span>'+m.label+' &mdash; weekly trend</div>'
        +'<div class="chart-area"><canvas id="hc'+i+'"></canvas></div>';
      chartsEl.appendChild(div);
      setTimeout(()=>{
        const ch=new Chart(document.getElementById('hc'+i).getContext('2d'),{
          type:'line',
          data:{labels:weeks,datasets:[
            {label:m.label,data:vals,borderColor:COLORS[i%5],backgroundColor:COLORS[i%5]+'18',borderWidth:2,pointRadius:4,pointBackgroundColor:COLORS[i%5],fill:true,tension:0.35},
            {label:'Goal',data:weeks.map(()=>m.goal),borderColor:'#d1d5db',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false}
          ]},
          options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y}}},
            scales:{
              y:{beginAtZero:true,grid:{color:'#f0f2f8'},ticks:{font:{size:11,family:'Inter'}}},
              x:{grid:{display:false},ticks:{font:{size:10,family:'Inter'}}}
            }
          }
        });
        histCharts.push(ch);
      },60);
    });
  }catch(e){wrap.innerHTML='<div class="hist-empty">Could not load history.</div>';console.warn(e);}
}
document.getElementById('prev-btn').addEventListener('click',()=>{currentMonday.setDate(currentMonday.getDate()-7);loadWeek(weekKey(currentMonday));});
document.getElementById('next-btn').addEventListener('click',()=>{currentMonday.setDate(currentMonday.getDate()+7);loadWeek(weekKey(currentMonday));});
document.getElementById('save-btn').addEventListener('click',saveWeek);
loadWeek(weekKey(currentMonday));
</script>
</body>
</html>
